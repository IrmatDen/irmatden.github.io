<html>
    <head>
        <title>Ce qu'il nous reste - Sheet</title>
        <style>
            .hblock {
                float: left;
                position: relative;
            }
            .invisible {
                display: none;
            }
            .container {
                display: table;
                border-spacing: 5px;
            }
            .row {
                display: table-row;
            }
            .inner-table {
                display: inline;
            }
            label, input {
                display: table-cell;
            }
            .multiline {
                float: left;
                width: 270px;
                padding: 5px;
                border-spacing: 5px;
            }
            .expertise {
                background-color: #B3EBF2;
            }
            .signs {
                background-color: #9bdbad;
            }
            .marks {
                background-color: #FF746C;
            }
            img {
                max-width: 500px;
                max-height: 500px;
                position: absolute;
                touch-action: none;
            }
            #portrait-area-selector {
                max-width: 500px;
                min-width: 63px;
                min-height: 92.6px;
                width: 100px;
                border: 1px solid lime;
                resize: horizontal;
                aspect-ratio: 63/92.6;
                overflow: auto;
                position: absolute;
                display: flex;
            }
            #drag-header {
                margin: 10px;
                cursor: move;
                flex-grow: 1;
            }

            /* Spinner styles */
            .spinner {
                border: 4px solid rgba(0, 0, 0, 0.1);
                width: 60px;
                height: 60px;
                border-radius: 50%;
                border-top-color: #3498db;
                animation: spin 1s ease-in-out infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .spinner-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(255, 255, 255, 0.7);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                display: none; /* Hidden by default */
            }
        </style>
    </head>
    <body>
        <!-- Spinner overlay -->
        <div class="spinner-overlay" id="spinner-overlay">
            <div class="spinner"></div>
        </div>

        <div class="hblock">
            <div class="hblock">
                <div class="container">
                    <div class="row">
                        <label>Player name:</label>
                        <input type="text" id="player" />
                    </div>
                    <div class="row">
                        <label>Campaign name:</label>
                        <input type="text" id="campaign" />
                    </div>
                    <div class="row">
                        <label>Character name:</label>
                        <input type="text" id="name" />
                    </div>
                    <div class="row">
                        <label>Concept:</label>
                        <input type="text" id="concept" />
                    </div>
                    <div class="row">
                        <label>Portrait:</label>
                        <input type="file" id="portrait" accept="image/png, image/jpeg" />
                    </div>
                </div>
                
                <div class="container">
                    <!-- Expertises -->
                    <div class="expertise multiline">
                        <div class="inner-table">
                            <label>Eclat #1:</label>
                            <input type="text" id="expertise-1" />
                        </div><br/>
                        <div class="inner-table">
                            <label>Eclat #2:</label>
                            <input type="text" id="expertise-2" />
                        </div><br/>
                        <div class="inner-table">
                            <label>Eclat #3:</label>
                            <input type="text" id="expertise-3" />
                        </div>
                    </div>
        
                    <!-- Marks -->
                    <div class="marks multiline">
                        <div class="inner-table">
                            <label>Marque:</label>
                            <input type="text" id="mark-1" />
                        </div><br/>
                        <!-- <div class="inner-table">
                            <label>Marques #2:</label>
                            <input type="text" id="mark-2" />
                        </div><br/>
                        <div class="inner-table">
                            <label>Marques #3:</label>
                            <input type="text" id="mark-3" />
                        </div> -->
                    </div>
        
                    <!-- Signs -->
                    <div class="signs multiline">
                        <div class="inner-table">
                            <label>Signes #1:</label>
                            <input type="text" id="sign-1" />
                        </div><br/>
                        <div class="inner-table">
                            <label>Signes #2:</label>
                            <input type="text" id="sign-2" />
                        </div><br/>
                        <div class="inner-table">
                            <label>Signes #3:</label>
                            <input type="text" id="sign-3" />
                        </div>
                    </div>
                </div>
        
                <div>
                    <button id="generate-sheet">Generate sheet PDF</button>
                </div>
            </div>

            <div class="hblock">
                <img id="portrait-display"></img>
                <div id="portrait-area-selector">
                    <div id="drag-header"></div>
                </div>
            </div>
        </div>

        <!-- Preload image to speedup pdf generation -->
        <canvas id="sheetCanvas" class="invisible"></canvas>

        <script src="drag-drop-touch.esm.min.js?autoload" type="module"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                // UI elements
                const portraitElement = document.getElementById("portrait-display");
                const canvas = document.getElementById("sheetCanvas");

                var sheetGraphic = null;

                const ctx = canvas.getContext("2d");
                const front = new Image();
                front.onload = async () => {
                    canvas.width = front.width;
                    canvas.height = front.height;

                    const choix = new Image(),
                          destin = new Image(),
                          fatalite = new Image();
                    choix.src = "./Layer_Choix.png";
                    destin.src = "./Layer_Destin.png";
                    fatalite.src = "./Layer_Fatalite.png";

                    await choix.decode();
                    await destin.decode();
                    await fatalite.decode();
                    
                    ctx.drawImage(choix, 0, 0);
                    ctx.drawImage(destin, 0, 0);
                    ctx.drawImage(fatalite, 0, 0);
                    ctx.drawImage(front, 0, 0);
                };
                front.src = "./Layer_Front.png";

                function dragElement(elmnt) {
                    var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                    document.getElementById("drag-header").onmousedown = dragMouseDown;
                    document.getElementById("drag-header").ontouchstart = dragTouchStart;

                    function dragMouseDown(e) {
                        e = e || window.event;
                        e.preventDefault();
                        // get the mouse cursor position at startup:
                        pos3 = e.clientX;
                        pos4 = e.clientY;
                        document.onmouseup = closeDragElement;
                        // call a function whenever the cursor moves:
                        document.onmousemove = elementMouseDrag;
                    }
                    function dragTouchStart(e) {
                        e = e || window.event;
                        e.preventDefault();
                        if (e.targetTouches.length > 0) {
                            const target = e.targetTouches[0];
                            pos3 = target.clientX;
                            pos4 = target.clientY;
                            document.ontouchend = closeDragElement;
                            // call a function whenever the cursor moves:
                            document.ontouchmove = elementTouchDrag;
                        }
                    }

                    function elementMouseDrag(e) {
                        e = e || window.event;
                        e.preventDefault();
                        doDrag(e.clientX, e.clientY);
                    }
                    function elementTouchDrag(e) {
                        e = e || window.event;
                        if (e.targetTouches.length > 0) {
                            const target = e.targetTouches[0];
                            doDrag(target.clientX, target.clientY);
                        }
                    }

                    function doDrag(clientX, clientY) {
                        // calculate the new cursor position:
                        pos1 = pos3 - clientX;
                        pos2 = pos4 - clientY;
                        pos3 = clientX;
                        pos4 = clientY;
                        
                        // set the element's new position:
                        var newTop = (elmnt.offsetTop - pos2);
                        var newLeft = (elmnt.offsetLeft - pos1);

                        if (newTop > portraitElement.height - 20) {
                            newTop = portraitElement.height - 20;
                        }
                        else if (newTop < 20 - elmnt.scrollHeight) {
                            newTop = 20 - elmnt.scrollHeight;
                        }
                        if (newLeft > portraitElement.width - 20) {
                            newLeft = portraitElement.width - 20;
                        }
                        else if (newLeft < 20 - elmnt.scrollWidth) {
                            newLeft = 20 - elmnt.scrollWidth;
                        }

                        elmnt.style.top = newTop + "px";
                        elmnt.style.left = newLeft + "px";
                    }

                    function closeDragElement() {
                        // stop moving when mouse button is released:
                        document.onmouseup = null;
                        document.onmousemove = null;
                        document.ontouchend =  null;
                        document.ontouchmove = null;
                    }
                }

                function v(id) {
                    return document.getElementById(id).value;
                }

                const worker = new Worker('pdf-worker.js');

                worker.onmessage = function(e) {
                    const blobUrl = URL.createObjectURL(e.data);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = `CQNR-${v("name")}.pdf`;
                    a.click();
                    URL.revokeObjectURL(blobUrl);

                    // Hide spinner overlay
                    document.getElementById("spinner-overlay").style.display = "none";
                };

                worker.onerror = function(e) {
                    console.error('Error in worker:', e);
                    alert('An error occurred while generating the PDF.');
                    // Hide spinner overlay
                    document.getElementById("spinner-overlay").style.display = "none";
                };

                document.getElementById("portrait").addEventListener('change', function() {
                    const portraitPath = this.files.length > 0 ? this.files[0] : null;
                    if (portraitPath) {
                        portraitElement.src = URL.createObjectURL(portraitPath);
                    }
                    else {
                        portraitElement.src = "";
                    }
                });

                document.getElementById("generate-sheet").addEventListener('click', function() {
                    // Look at select image area.
                    var area = { x: 0, y: 0, width: 1, height: 1 };
                    if (portraitElement.src && portraitElement.src != "") {
                        const selector = document.getElementById("portrait-area-selector");

                        area.x = parseInt(selector.style.left, 10) / portraitElement.scrollWidth;
                        area.y = parseInt(selector.style.top) / portraitElement.scrollHeight;
                        area.width = selector.scrollWidth / portraitElement.scrollWidth;
                        area.height = selector.scrollHeight / portraitElement.scrollHeight;
                    }
                    
                    sheetGraphic = canvas.toDataURL("image/png", 0.9);

                    // Show spinner overlay
                    document.getElementById("spinner-overlay").style.display = "flex";

                    worker.postMessage({
                        expertise: [v("expertise-1"), v("expertise-2"), v("expertise-3")],
                        marks: [v("mark-1")/* , v("mark-2"), v("mark-3") */],
                        signs: [v("sign-1"), v("sign-2"), v("sign-3")],
                        name: v("name"),
                        concept: v("concept"),
                        player: v("player"),
                        campaign: v("campaign"),
                        portrait: portraitElement.src,
                        area,
                        sheetGraphic
                    });
                });

                // Make the DIV element draggable:
                dragElement(document.getElementById("portrait-area-selector"));
            });
        </script>
    </body>
</html>
